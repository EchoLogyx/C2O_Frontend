<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Express Quote · Product Finder Test</title>
<style>
  :root{
    --ink:#15202b; --ink-soft:#3d4a57; --line:#e3e6ea; --line-2:#eef0f3;
    --paper:#ffffff; --canvas:#f6f7f9; --accent:#f4a014; --accent-ink:#7a4d00;
    --good:#2f7d52; --pick:#0f3d2e; --muted:#6b7682; --chip:#eef1f4;
    --radius:14px; --shadow:0 1px 2px rgba(21,32,43,.06),0 8px 24px rgba(21,32,43,.06);
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--canvas);line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 56px}
  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .brand{display:flex;flex-direction:column;gap:3px}
  .kicker{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
  h1{font-size:26px;line-height:1.05;margin:0;letter-spacing:-.02em;font-weight:800}
  .sub{font-size:13.5px;color:var(--ink-soft);margin-top:2px}
  .count{display:flex;align-items:baseline;gap:9px;background:var(--ink);color:#fff;border-radius:12px;padding:11px 16px;box-shadow:var(--shadow)}
  .count b{font-size:24px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .count span{font-size:12px;color:#aeb8c2}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}
  @media(max-width:860px){.grid{grid-template-columns:1fr}}

  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .qpanel{padding:6px 18px 18px;position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto;overscroll-behavior:contain}
  @media(max-width:860px){.qpanel{position:static;max-height:none;overflow:visible}}
  .q{padding:14px 0 4px;border-bottom:1px solid var(--line-2)}
  .q:last-child{border-bottom:0}
  .q .lab{font-size:12.5px;font-weight:700;letter-spacing:.01em;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .q .lab small{font-weight:500;color:var(--muted);font-size:11px;text-align:right}
  .opts{display:flex;flex-wrap:wrap;gap:7px}
  .opt{appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    padding:7px 11px;border-radius:9px;font:inherit;font-size:12.5px;cursor:pointer;transition:all .12s ease}
  .opt:hover:not([disabled]){border-color:#c7ccd2;color:var(--ink)}
  .opt[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:600}
  .opt[disabled]{opacity:.3;cursor:not-allowed;text-decoration:line-through;background:var(--line-2)}
  .opt:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .qty{display:flex;align-items:center;gap:10px}
  .qty input{width:110px;font:inherit;font-size:15px;font-weight:700;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-variant-numeric:tabular-nums}
  .qty input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .break{font-size:11.5px;color:var(--muted)}
  .break b{color:var(--accent-ink);background:#fdf2dc;padding:1px 7px;border-radius:6px;font-variant-numeric:tabular-nums}
  .ranknote{font-size:10.5px;color:var(--muted);margin-top:7px}
  .reset{margin-top:14px;width:100%;border:1px dashed var(--line);background:#fff;color:var(--muted);
    padding:9px;border-radius:9px;font:inherit;font-size:12px;cursor:pointer}
  .reset:hover{color:var(--ink);border-color:#c7ccd2}

  .results{min-height:300px}
  .rbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:13px 16px;border-bottom:1px solid var(--line-2);font-size:12.5px;color:var(--ink-soft)}
  .rbar .tags{color:var(--muted)}
  .rbar .tags b{color:var(--ink);font-weight:600}
  .rbar .fallback{color:var(--accent-ink);background:#fdf2dc;padding:7px 11px;border-radius:8px;font-weight:600;font-size:12px;width:100%}
  .cards{padding:14px 16px;display:grid;gap:11px}
  .card{border:1px solid var(--line);border-radius:12px;padding:13px 15px;display:grid;grid-template-columns:1fr auto;gap:6px 14px;align-items:start;background:#fff}
  .card.pick{border-color:var(--pick);box-shadow:0 0 0 1px var(--pick) inset}
  .card .nm{font-weight:700;font-size:14px;letter-spacing:-.01em}
  .card .br{font-size:12px;color:var(--muted);margin-top:1px}
  .attrs{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .badge{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--chip);color:var(--ink-soft);letter-spacing:.01em}
  .badge.tier{background:#eaf3ee;color:var(--good)}
  .badge.tier.est{background:#fff;color:var(--accent-ink);border:1px dashed var(--accent)}
  .badge.fast{background:#fdf2dc;color:var(--accent-ink)}
  .badge.kids{background:#eef0ff;color:#3b46b3}
  .badge.pickflag{background:var(--pick);color:#fff}
  .badge.alt{background:#fff;border:1px solid var(--line);color:var(--muted)}
  .price{text-align:right;white-space:nowrap}
  .price .v{font-size:19px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .price .u{font-size:10.5px;color:var(--muted);display:block;margin-top:1px}
  .price .tot{font-size:11px;color:var(--ink-soft);margin-top:4px;font-variant-numeric:tabular-nums}
  .empty{padding:48px 24px;text-align:center;color:var(--muted)}
  .empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:4px}
  .foot{font-size:11px;color:var(--muted);padding:0 16px 16px;line-height:1.6}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="kicker">Clothes2Order · Express Quote</div>
      <h1>Product finder test</h1>
      <div class="sub">Each question filters the next. You can only pick what's still in stock for your earlier answers.</div>
    </div>
    <div class="count"><b id="cnt">0</b><span>products<br>returned</span></div>
  </header>

  <div class="grid">
    <section class="panel qpanel" id="qpanel"></section>
    <section class="panel results">
      <div class="rbar" id="rbar"></div>
      <div class="cards" id="cards"></div>
      <div class="foot" id="foot"></div>
    </section>
  </div>
</div>

const PURPOSE_MAP = {
  "Company Uniforms":    {tags:["Uniform","Workwear","Hospitality","Security","Healthcare"]},
  "Sports & Teamwear":   {tags:["Teamwear","Sportswear","Golf","Tennis"]},
  "Events & Promotions": {tags:["Promotions","Tradeshows","Stag Do","Hen Do"]},
  "Charity & Fundraising":{tags:["Charities"]},
  "School & Education":  {tags:["Schoolwear","Leavers Hoodies"], sector:["Education"]},
  "Retail & Merchandise":{tags:["Merchandise","Fashion","Gifts"]},
};
const TIER_SCORE = {Best:4, Better:3, Good:2, Budget:1, "":0};

// per-garment price thresholds (25/50/75 percentile of qty-1 price) for estimating
// a tier on products the feed leaves blank (all Polo Shirts and Jackets)
const GARMENT_BANDS = (function(){
  const byG={}, out={};
  PRODUCTS.forEach(p=>{ const pr=p.ladder.length?p.ladder[0][1]:null; if(pr!=null)(byG[p.garment]=byG[p.garment]||[]).push(pr); });
  for(const g in byG){ const a=byG[g].slice().sort((x,y)=>x-y); const q=f=>a[Math.floor(f*(a.length-1))]; out[g]=[q(0.25),q(0.5),q(0.75)]; }
  return out;
})();
function tierOf(p){
  if(p.tier) return {label:p.tier, est:false};
  const pr=p.ladder.length?p.ladder[0][1]:null, b=GARMENT_BANDS[p.garment];
  if(pr==null||!b) return {label:"", est:false};
  const t = pr<=b[0]?"Budget" : pr<=b[1]?"Good" : pr<=b[2]?"Better" : "Best";
  return {label:t, est:true};
}
function tierScore(p){ return TIER_SCORE[tierOf(p).label]??0; }

function fabBucket(f){
  if(!f) return "";
  if(f.indexOf("Poly/Cotton")>=0) return "Poly-cotton";
  if(f.indexOf("Polyester")>=0) return "Polyester";
  if(f.indexOf("Cotton")>=0) return "Cotton";
  return f;
}

// ---- facet definitions, applied in order (the cascade) ----
const FACETS = [
  {key:"speed", label:"When do you need this for?", type:"speed",
    options:["Within 2 days","Within 5 days","Not urgent"]},
  {key:"purpose", label:"What's it for?", type:"tag",
    options:["Company Uniforms","Sports & Teamwear","Events & Promotions","Charity & Fundraising","School & Education","Retail & Merchandise"]},
  {key:"garment", label:"Which garment?", type:"eq", get:p=>p.garment,
    options:["T-Shirts","Polo Shirts","Hoodies","Jackets"]},
  {key:"gender", label:"Who's it for?", type:"gender", get:p=>p.gender, note:"Unisex shown with Mens/Womens",
    options:["Mens","Womens","Kids","Unisex"]},
  {key:"fabric", label:"What fabric?", type:"eq", get:p=>fabBucket(p.fabric),
    options:["Cotton","Polyester","Poly-cotton"]},
  {key:"weight", label:"What weight?", type:"eq", get:p=>p.weight,
    options:["Lightweight","Mediumweight","Heavyweight"]},
  {key:"fit", label:"What fit?", type:"eq", get:p=>p.fit, options:["Regular","Slim"], autohide:true},
];

const state = {speed:null, purpose:null, garment:null, gender:null, fabric:null, weight:null, fit:null, priority:null, qty:25};

function facetMatch(fct,p,v){
  if(fct.type==="tag"){ const m=PURPOSE_MAP[v]; return p.purpose.some(t=>m.tags.includes(t)) || ((m.sector||[]).length>0 && p.sector.some(s=>m.sector.includes(s))); }
  if(fct.type==="gender"){ return v==="Kids" ? p.gender==="Kids" : (p.gender===v || p.gender==="Unisex"); }
  if(fct.type==="speed"){ return v==="Within 2 days" ? p.nextday : true; }
  return fct.get(p)===v;
}
// products passing all active facets, optionally ignoring one (for facet availability)
function passes(p, exceptKey){
  for(const fct of FACETS){
    if(fct.key===exceptKey) continue;
    const v=state[fct.key];
    if(v==null) continue;
    if(!facetMatch(fct,p,v)) return false;
  }
  return true;
}
// would picking `opt` for facet, given the OTHER active filters, return anything?
function optionAvailable(fct,opt){
  return PRODUCTS.some(p=> passes(p,fct.key) && facetMatch(fct,p,opt));
}

// ---- pricing ----
function unitPrice(p, qty){
  let chosen = p.ladder.length? p.ladder[0] : null;
  for(const [q,price] of p.ladder){ if(qty>=q) chosen=[q,price]; }
  return chosen ? {price:chosen[1], breakQ:chosen[0]} : {price:null, breakQ:null};
}

// ---- build panel ----
function renderPanel(){
  const p=document.getElementById("qpanel");
  let html="";
  for(const fct of FACETS){
    const avail = fct.options.map(o=>({o, ok:optionAvailable(fct,o) || state[fct.key]===o}));
    const liveCount = avail.filter(a=>a.ok).length;
    if(fct.autohide && state[fct.key]==null && liveCount<2) continue; // hide non-discriminating facets
    const opts = avail.map(a=>
      `<button class="opt" data-k="${fct.key}" data-v="${a.o}" aria-pressed="${state[fct.key]===a.o}" ${a.ok?"":"disabled"}>${a.o}</button>`
    ).join("");
    html += `<div class="q"><div class="lab">${fct.label}${fct.note?`<small>${fct.note}</small>`:""}</div><div class="opts">${opts}</div></div>`;
  }
  // quantity
  html += `<div class="q"><div class="lab">How many?</div>
       <div class="qty"><input id="qty" type="number" min="1" value="${state.qty}" inputmode="numeric">
       <span class="break" id="break"></span></div></div>`;
  html += `<button class="reset" id="reset">Reset answers</button>`;
  p.innerHTML=html;

  p.querySelectorAll(".opt").forEach(b=>{ if(b.disabled) return; b.onclick=()=>{
    const k=b.dataset.k, v=b.dataset.v;
    if(k==="priority"){ state.priority = (state.priority===v) ? null : v; }
    else { state[k] = (state[k]===v) ? null : v; }
    renderPanel(); update();
  };});
  document.getElementById("qty").oninput=e=>{ state.qty=Math.max(1,parseInt(e.target.value||"1",10)); update(); };
  document.getElementById("reset").onclick=()=>{
    Object.assign(state,{speed:null,purpose:null,garment:null,gender:null,fabric:null,weight:null,fit:null,priority:null,qty:25});
    renderPanel(); update();
  };
}
const FACETS_PRIORITY=["Lowest price","Balanced","Best quality"];

// ---- results ----
function rank(list){
  const wp=list.map(p=>({p,up:unitPrice(p,state.qty)}));
  const price=x=>x.up.price??1e9;
  const tier=x=>tierScore(x.p);
  const pr=state.priority;
  if(pr==="Lowest price")      wp.sort((a,b)=> price(a)-price(b));                 // cheapest first
  else if(pr==="Best quality") wp.sort((a,b)=> tier(b)-tier(a) || price(b)-price(a)); // top tier, then most premium
  else                          wp.sort((a,b)=> tier(b)-tier(a) || price(a)-price(b)); // Balanced/default: top tier, then best value
  return wp;
}
function gbp(n){ return n==null?"—":"£"+n.toFixed(2); }
function card(item,flags){
  const {p,up}=item, total=up.price!=null?up.price*state.qty:null, b=[];
  if(flags.pick) b.push(`<span class="badge pickflag">Top pick</span>`);
  if(flags.cheaper) b.push(`<span class="badge alt">Cheapest</span>`);
  if(flags.better) b.push(`<span class="badge alt">Best quality</span>`);
  const ti=tierOf(p);
  if(ti.label) b.push(`<span class="badge tier ${ti.est?'est':''}">${ti.label}${ti.est?' ~':''}</span>`);
  if(p.fabric) b.push(`<span class="badge">${fabBucket(p.fabric)}</span>`);
  if(p.weight) b.push(`<span class="badge">${p.weight}</span>`);
  if(p.fit) b.push(`<span class="badge">${p.fit}</span>`);
  if(p.nextday) b.push(`<span class="badge fast">Next-day</span>`);
  if(p.kids) b.push(`<span class="badge kids">Zero VAT</span>`);
  return `<div class="card ${flags.pick?'pick':''}">
    <div><div class="nm">${p.name||p.brand||p.code}</div>
      <div class="br">${p.brand} · ${p.garment} · ${p.gender}</div>
      <div class="attrs">${b.join("")}</div></div>
    <div class="price"><span class="v">${gbp(up.price)}</span>
      <span class="u">per unit @ ${up.breakQ??"—"}+</span>
      <div class="tot">${total!=null?gbp(total)+" total":""}</div></div></div>`;
}
function update(){
  const bks=[1,8,15,40,100,250,500]; let chosen=1; bks.forEach(q=>{if(state.qty>=q)chosen=q;});
  const brk=document.getElementById("break"); if(brk) brk.innerHTML=`price break: <b>${chosen}+</b>`;

  const list=PRODUCTS.filter(p=>passes(p,null));
  let ranked=rank(list), fallback=false;
  if(!ranked.length && state.speed==="Within 2 days"){
    const relaxed=PRODUCTS.filter(p=>passes(p,"speed"));   // same answers, ignore the 2-day filter
    if(relaxed.length){ ranked=rank(relaxed); fallback=true; }
  }
  document.getElementById("cnt").textContent=ranked.length;

  let tagLine;
  if(state.purpose){ const m=PURPOSE_MAP[state.purpose];
    tagLine=`Purpose matching on <b>${[...m.tags,...(m.sector||[]).map(s=>s+" (sector)")].join(", ")}</b>`; }
  else tagLine=`No purpose chosen — all garments in play`;
  document.getElementById("rbar").innerHTML = fallback
    ? `<span class="fallback">No next-day options for these answers. Showing the fastest standard lead-time matches instead.</span>`
    : `<span><b style="color:var(--ink)">${ranked.length}</b> match</span><span class="tags">· ${tagLine}</span>`;

  const el=document.getElementById("cards");
  if(!ranked.length){
    el.innerHTML=`<div class="empty"><b>Nothing left</b>Your answers don't overlap on any product. Reset, or change the last pick.</div>`;
    document.getElementById("foot").textContent=""; return;
  }
  let cheap=0,best=0;
  ranked.forEach((it,i)=>{ if((it.up.price??1e9)<(ranked[cheap].up.price??1e9))cheap=i;
    if(tierScore(it.p)>tierScore(ranked[best].p))best=i; });
  el.innerHTML=ranked.map((it,i)=>card(it,{pick:i===0,cheaper:i!==0&&i===cheap,better:i!==0&&i===best&&best!==cheap})).join("");
  document.getElementById("foot").innerHTML = fallback
    ? `These are standard lead-time, not next-day. Prices shown at qty <b>${state.qty}</b>. Quality tier is on each item.`
    : `Sorted by best value at qty <b>${state.qty}</b>. Tier badges marked ~ are estimated from price (Polo Shirts and Jackets have no tier in the feed yet). Decoration, origination, delivery and VAT are added after this step.`;
}

renderPanel(); update();
</script>
