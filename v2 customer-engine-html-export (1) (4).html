function CustomerEngine() {
  const [view, setView] = useState('home');
  const [messages, setMessages] = useState([]);
  const [quote, setQuote] = useState({ useCase: null, qty: 10, priority: null, productType: null, product: null, placement: null, method: null, logoStatus: null, deadline: null, selectedTier: null, name: '', email: '' });
  const [step, setStep] = useState(0);
  const [textInput, setTextInput] = useState('');
  const [usedAdvice, setUsedAdvice] = useState([]);
  const [adviceProfile, setAdviceProfile] = useState({ sector: null, headcount: null, budget: null, tier: null, productType: null, features: [], season: null, formality: null, branding: null, asked: [], pending: null });
  const [actionMode, setActionMode] = useState(null);
  const scrollRef = useRef(null);

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages, view, step]);

  const reset = () => { setView('home'); setMessages([]); setQuote({ useCase: null, qty: 10, priority: null, productType: null, product: null, placement: null, method: null, logoStatus: null, deadline: null, selectedTier: null, name: '', email: '' }); setStep(0); setTextInput(''); setUsedAdvice([]); setAdviceProfile({ sector: null, headcount: null, budget: null, tier: null, productType: null, features: [], season: null, formality: null, branding: null, asked: [], pending: null }); setActionMode(null); };

  const push = (from, content) => setMessages(m => [...m, { from, content, t: Date.now() + Math.random() }]);

  const isWithinCallHours = () => { const now = new Date(); const h = now.getHours(); const day = now.getDay(); return day >= 1 && day <= 5 && h >= 9 && h < 17; };
  const nextDayAvailable = () => new Date().getHours() < 11;

  const startCapability = (cap) => {
    setView(cap); setStep(0); setTextInput(''); setActionMode(null);
    if (cap === 'quote') setMessages([{ from: 'morgan', content: "Great — I'll get you five priced options in under two minutes. First, what's the order for?", t: 1 }]);
    else if (cap === 'faq') setMessages([{ from: 'morgan', content: "Sure — tap one of these, or type your own question below.", t: 1 }]);
    else if (cap === 'chat') {
      const callWindow = isWithinCallHours();
      setMessages([
        { from: 'morgan', content: callWindow ? "Connecting you to our team now. Sarah is online — we typically respond within 30 minutes during working hours (9am–5pm)." : "Our team is offline (working hours 9am–5pm Mon–Fri). I'll take your details and we'll be in touch within 30 minutes of opening tomorrow.", t: 1 },
        { from: 'system', content: "Sarah from C2O has joined the chat", t: 2 },
        { from: 'human', content: "Hi there! I'm Sarah — how can I help today?", t: 3 },
      ]);
    } else if (cap === 'advice') {
      setUsedAdvice([]);
      setAdviceProfile({ sector: null, headcount: null, budget: null, tier: null, productType: null, features: [], season: null, formality: null, branding: null, asked: [], pending: null });
      setMessages([{ from: 'morgan', content: "I'll help you find the right kit. Tell me about your team — who's it for, what for, and any specific needs?", t: 1 }]);
    }
  };

  const quoteSteps = [
    { key: 'useCase', q: "What's the order for?", options: USE_CASES, freeText: true },
    { key: 'qty', q: "How many do you need?", qtyStepper: true },
    { key: 'priority', q: "What matters most for this order?", options: ['Lowest price', 'Best quality', 'Most durable', 'Sustainability', 'Best balance'], freeText: true },
    { key: 'productType', q: "Which type of garment?", productTypes: true },
    { key: 'product', q: "Pick your specific style:", products: true },
    { key: 'placement', q: "Where would you like the logo?", options: PLACEMENTS },
    { key: 'method', q: "And how should we apply it?", methods: true },
    { key: 'logoStatus', q: "Is this a new logo, or one we already have on file?", options: ['New design', 'Existing logo on file'] },
    { key: 'deadline', q: "When do you need them by?", deadline: true },
  ];

  const handleQuoteAnswer = (key, value, label) => {
    setQuote(q => ({ ...q, [key]: value })); push('user', label || value);
    setTimeout(() => {
      const next = step + 1;
      if (next < quoteSteps.length) { push('morgan', quoteSteps[next].q); setStep(next); }
      else { push('morgan', 'Brilliant — generating your five options now…'); setTimeout(() => setStep(quoteSteps.length), 600); }
    }, 300);
  };

  const goBackToStep = (targetStep) => {
    if (targetStep < 0 || targetStep >= step) return;
    const updated = { ...quote };
    quoteSteps.forEach((s, i) => { if (i >= targetStep) { if (s.key === 'qty') updated.qty = 10; else updated[s.key] = null; } });
    updated.selectedTier = null;
    setQuote(updated);
    setMessages(prev => {
      let morganCount = -1; let cutoff = prev.length;
      for (let i = 0; i < prev.length; i++) {
        if (prev[i].from === 'morgan') { morganCount++; if (morganCount === targetStep + 1) { cutoff = i + 1; break; } }
      }
      return prev.slice(0, cutoff);
    });
    setStep(targetStep);
  };

  const handleQuoteFreeText = (text) => {
    const s = quoteSteps[step];
    if (!s || !s.freeText) return;
    handleQuoteAnswer(s.key, text, text);
  };

  const getDelivery = () => { if (!quote.deadline) return 9.95; if (quote.deadline.includes('Next day')) return 34.95; if (quote.deadline.includes('Express')) return 24.95; if (quote.deadline.includes('Standard') || quote.deadline.includes('7–10')) return 9.95; return 6.95; };

  const computeQuote = () => {
    if (!quote.product || !quote.qty || !quote.method) return null;
    const product = PRODUCTS.find(p => p.id === quote.product);
    const method = METHODS.find(m => m.id === quote.method);
    const qty = parseInt(quote.qty) || 10;
    const existingLogo = quote.logoStatus === 'Existing logo on file';
    const volumeWaiver = qty >= 250;
    const setupFree = existingLogo || volumeWaiver;
    const setupReason = existingLogo ? 'existing' : volumeWaiver ? 'volume' : 'none';
    const delivery = getDelivery();
    return ['Budget', 'Everyday', 'Premium', 'Retail', 'Designer'].map(tier => {
      const unit = product.tiers[tier] + method.costPer;
      const setup = setupFree ? 0 : method.setup;
      const total = unit * qty + setup + delivery;
      return { tier, unit, qty, setup, setupFree, setupReason, delivery, total, perUnit: total / qty, garment: product.tiers[tier], decoration: method.costPer };
    });
  };
  const quoteOptions = computeQuote();

  const askFAQ = (item) => { push('user', item.q); setTimeout(() => push('morgan', item.a), 300); };

  const handleFAQText = () => {
    const q = textInput.trim(); if (!q) return;
    push('user', q); setTextInput('');
    const lower = q.toLowerCase();
    let answer = null;
    const match = FAQ.find(f => { const kws = f.q.toLowerCase().match(/\b\w{4,}\b/g) || []; return kws.some(k => lower.includes(k)); });
    if (match) answer = match.a;
    if (!answer) {
      if (lower.includes('price') || lower.includes('cost') || lower.includes('how much')) answer = "Pricing depends on quantity, garment and decoration method. Fastest way to a real number is the Express Quote — about 2 minutes. Want me to start?";
      else if (lower.includes('return')) answer = "Branded items are made to order, so we can't take general returns. Quality issues we always sort.";
      else if (lower.includes('sample')) answer = "Yes — unbranded blank samples available. Small charge that gets refunded against your order.";
      else if (lower.includes('vat')) answer = "All quoted prices are ex-VAT. We add 20% VAT at checkout.";
      else if (lower.includes('next day')) answer = "Yes — Next Day delivery is available if you order before 11am. There's an uplift on delivery cost which I'll show in the quote.";
    }
    if (!answer) answer = "Good question — let me pass that to a human. Hit 'Human' below for a live conversation.";
    setTimeout(() => push('morgan', answer), 500);
  };

  const handleAdviceScenario = (scenario) => {
    setUsedAdvice(u => [...u, scenario.id]);
    push('user', scenario.request);

  };

  const renderQuoteInline = () => {
    if (step >= quoteSteps.length) return null;

    if (s.qtyStepper) {

      const bump = (delta) => setQty((quote.qty || 10) + delta);
      return (
        <InlineOptions>
          <div style={{ background: '#fff', border: `1.5px solid ${BORDER}`, borderRadius: 12, padding: 16, maxWidth: 380 }}>

              <button onClick={() => bump(-1)} style={{ width: 40, height: 40, borderRadius: 8, border: `1.5px solid ${BORDER}`, background: '#fff', cursor: 'pointer', fontSize: 20, fontWeight: 600, color: NAVY, fontFamily: 'inherit' }}>−</button>
              <input type="number" value={qty} onChange={e => setQty(parseInt(e.target.value) || 1)} style={{ width: 100, padding: '10px 12px', borderRadius: 8, border: `1.5px solid ${BORDER}`, fontSize: 20, fontWeight: 700, color: INK, textAlign: 'center', fontFamily: FONT_HEAD, outline: 'none' }} />
              <button onClick={() => bump(1)} style={{ width: 40, height: 40, borderRadius: 8, border: `1.5px solid ${BORDER}`, background: '#fff', cursor: 'pointer', fontSize: 20, fontWeight: 600, color: NAVY, fontFamily: 'inherit' }}>+</button>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, justifyContent: 'center', marginTop: 12 }}>

        </InlineOptions>

    if (s.products) {

    if (s.methods) {
      return (
        <InlineOptions>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {METHODS.map(m => (
              <button key={m.id} onClick={() => handleQuoteAnswer('method', m.id, m.name)} style={{ padding: 14, borderRadius: 10, border: `1.5px solid ${BORDER}`, background: '#fff', cursor: 'pointer', textAlign: 'left', fontFamily: 'inherit' }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: INK, fontFamily: FONT_HEAD }}>{m.name}</div>

      return (

                {showRecommended && <div style={{ position: 'absolute', top: -9, left: 14, background: NAVY_LIGHT, color: '#fff', fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 10, letterSpacing: '0.3px' }}>RECOMMENDED</div>}
                <div style={{ width: 20, height: 20, borderRadius: '50%', border: `2px solid ${isSelected ? NAVY : '#cbd5e1'}`, background: '#fff', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>

                  <div style={{ fontSize: 20, fontWeight: 800, color: INK, lineHeight: 1, fontFamily: FONT_HEAD }}>£{o.total.toFixed(0)}</div>
                  <div style={{ fontSize: 10, color: MUTED, marginTop: 4 }}>£{o.perUnit.toFixed(2)}/unit</div>
                </div>
              </button>
            );
          })}
        </div>

        {selected && (() => {
          const meta = TIER_META[selected.tier];
          return (
            <div style={{ background: '#fff', border: `2px solid ${NAVY}`, borderRadius: 12, padding: 16, marginBottom: 12, boxShadow: '0 4px 12px rgba(74, 144, 226, 0.15)' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: INK, fontFamily: FONT_HEAD }}>Your selection: {meta.name}</div>
                <div style={{ fontSize: 11, color: NAVY, fontWeight: 600, background: '#eff6ff', padding: '4px 8px', borderRadius: 6 }}>{meta.brand}</div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, fontSize: 13, color: INK }}>

                  <div style={{ display: 'flex', justifyContent: 'space-between' }}><span>{method.name} (per unit)</span><span>£{selected.decoration.toFixed(2)} × {selected.qty} = £{(selected.decoration * selected.qty).toFixed(2)}</span></div>

                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="Truck" size={12} /> Delivery ({quote.deadline})</span><span>£{selected.delivery.toFixed(2)}</span></div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', borderTop: `1px solid ${BORDER}`, paddingTop: 8, marginTop: 4, fontSize: 15, fontWeight: 700, color: INK, fontFamily: FONT_HEAD }}><span>Total (ex. VAT)</span><span>£{selected.total.toFixed(2)}</span></div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: MUTED }}><span>Per-unit cost</span><span>£{selected.perUnit.toFixed(2)}</span></div>

          <div style={{ fontSize: 12, fontWeight: 700, color: '#166534', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 10 }}>Order placed</div>
          <div style={{ display: 'flex', gap: 12, marginBottom: 10 }}>
            <CadIcon type={product?.type} size={48} />
            <div style={{ fontSize: 13, color: INK, lineHeight: 1.6 }}>
              <div><strong>{quote.qty} × {product?.name}</strong></div>
              <div style={{ fontSize: 12, color: MUTED }}>{METHODS.find(m => m.id === quote.method)?.name} on {quote.placement?.toLowerCase()}</div>
              {selected && <div style={{ fontSize: 12, color: NAVY, fontWeight: 600, marginTop: 2 }}>{TIER_META[selected.tier].name} — £{selected.total.toFixed(2)}</div>}
            </div>
          </div>
          <div style={{ fontSize: 13, color: INK, lineHeight: 1.7, borderTop: `1px solid #bbf7d0`, paddingTop: 10 }}>
            <div><strong>Name:</strong> {quote.name}</div>
            <div><strong>Email:</strong> {quote.email}</div>
            <div><strong>Logo:</strong> {quote.logoStatus}</div>
            <div><strong>Need by:</strong> {quote.deadline}</div>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: GREEN, marginBottom: 16 }}><Icon name="Check" size={14} /> Pushed to HubSpot CRM as a qualified lead</div>
      </div>
    );
  };

  const renderMessages = () => {
    let userMsgIdx = -1;
    return (
      <>
        {messages.map(m => {
          if (m.from === 'system') return <div key={m.t} style={{ textAlign: 'center', fontSize: 11, color: MUTED, margin: '8px 0' }}>— {m.content} —</div>;
          let stepForEdit = null;
          if (m.from === 'user' && view === 'quote') {
            userMsgIdx++;
            if (userMsgIdx < step) stepForEdit = userMsgIdx;
          }
          return (
            <div key={m.t} style={{ position: 'relative' }}>
              <Bubble from={m.from === 'user' ? 'user' : 'morgan'}>{m.content}</Bubble>
              {stepForEdit !== null && (
                <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: -8, marginBottom: 10, paddingRight: 4 }}>
                  <button onClick={() => goBackToStep(stepForEdit)} style={{ fontSize: 11, color: NAVY, background: 'transparent', border: 'none', padding: '2px 6px', cursor: 'pointer', fontFamily: 'inherit', display: 'flex', alignItems: 'center', gap: 3, fontWeight: 600 }}>
                    <Icon name="Edit" size={10} /> Edit
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </>
    );
  };

  const renderFAQChips = () => (
    <InlineOptions label="Common questions">
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
        {FAQ.map(item => <QuickReply key={item.q} onClick={() => askFAQ(item)}>{item.q}</QuickReply>)}
      </div>
    </InlineOptions>
  );

  const renderAdviceChips = () => {
    const isStart = messages.length <= 1;
    if (!isStart) return null;
    const remaining = ADVICE_SCENARIOS.filter(s => !usedAdvice.includes(s.id));
    if (remaining.length === 0) return null;
    return (
      <InlineOptions label="Or try a starter scenario">
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {remaining.map(s => <QuickReply key={s.id} onClick={() => handleAdviceScenario(s)}>{s.label}</QuickReply>)}
        </div>
      </InlineOptions>
    );
  };

  const renderFooterInput = () => {
    if (view === 'faq') return (
      <div style={{ display: 'flex', gap: 8 }}>
        <input value={textInput} onChange={e => setTextInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') handleFAQText(); }} placeholder="Type your own question…" style={{ flex: 1, padding: '11px 14px', borderRadius: 8, border: `1.5px solid ${BORDER}`, fontSize: 14, fontFamily: 'inherit', outline: 'none' }} />
        <button onClick={handleFAQText} style={{ padding: '11px 14px', borderRadius: 8, border: 'none', background: NAVY, color: '#fff', cursor: 'pointer', display: 'flex', alignItems: 'center' }}><Icon name="Send" size={16} /></button>
      </div>
    );
    if (view === 'chat') return (
      <div style={{ display: 'flex', gap: 8 }}>
        <input value={textInput} onChange={e => setTextInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && textInput.trim()) { push('user', textInput); setTextInput(''); setTimeout(() => push('human', "Thanks — let me check that for you."), 800); } }} placeholder="Type your message…" style={{ flex: 1, padding: '11px 14px', borderRadius: 8, border: `1.5px solid ${BORDER}`, fontSize: 14, fontFamily: 'inherit', outline: 'none' }} />
        <button onClick={() => { if (!textInput.trim()) return; push('user', textInput); setTextInput(''); setTimeout(() => push('human', "Thanks — let me check that for you."), 800); }} style={{ padding: '11px 14px', borderRadius: 8, border: 'none', background: NAVY, color: '#fff', cursor: 'pointer', display: 'flex', alignItems: 'center' }}><Icon name="Send" size={16} /></button>
      </div>
    );
    return null;
  };

  const showFooter = view === 'faq' || view === 'chat';

  const renderHome = () => (
    <div>
      <div style={{ textAlign: 'center', padding: '32px 0 24px' }}>
        <div style={{ marginBottom: 12 }}><MorganAvatar size={64} /></div>
        <div style={{ fontSize: 22, fontWeight: 900, color: INK, fontFamily: FONT_HEAD }}>Hi, I'm Morgan</div>
        <div style={{ fontSize: 13, color: MUTED, marginTop: 4 }}>Your assistant at Clothes2Order. What can I help with today?</div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
        {[
          { v: 'quote', icon: 'FileText', label: 'Get a quote', sub: 'Five priced options in 2 min', color: NAVY },
          { v: 'faq', icon: 'MessageSquare', label: 'Ask a question', sub: 'Setup, delivery, minimums', color: '#7c3aed' },
          { v: 'chat', icon: 'Headphones', label: 'Speak to a person', sub: 'Live team — 9am to 5pm', color: GREEN },
          { v: 'advice', icon: 'Sparkles', label: 'Help me choose', sub: 'Product advice', color: AMBER, phase2: true },
        ].map(c => (
          <button key={c.v} onClick={() => startCapability(c.v)} style={{ padding: 16, borderRadius: 12, border: `1.5px solid ${BORDER}`, background: '#fff', cursor: 'pointer', textAlign: 'left', fontFamily: 'inherit', display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div style={{ width: 36, height: 36, borderRadius: 8, background: `${c.color}15`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: c.color }}><Icon name={c.icon} size={18} /></div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700, color: INK, display: 'flex', alignItems: 'center', fontFamily: FONT_HEAD }}>{c.label}{c.phase2 && <PhaseTag />}</div>
              <div style={{ fontSize: 12, color: MUTED, marginTop: 2 }}>{c.sub}</div>
            </div>
          </button>
        ))}
      </div>
      <div style={{ marginTop: 20, padding: 12, background: '#eff6ff', border: `1px solid ${NAVY_LIGHT}`, borderRadius: 10, fontSize: 12, color: NAVY_DARK, display: 'flex', alignItems: 'flex-start', gap: 8 }}>
        <Icon name="Info" size={14} style={{ marginTop: 1, flexShrink: 0 }} />
        <div><strong>Demo mode.</strong> All pricing and products are dummy data for stakeholder review. CAD-style thumbnails are placeholders. Freeform AI answers are illustrative — production will use a tuned LLM over the C2O knowledge base, with accuracy refined in QA.</div>
      </div>
    </div>
  );

  return (
    <div style={{ height: '100vh', width: '100%', display: 'flex', flexDirection: 'column', fontFamily: '"Lato", "Quicksand", "Arial", sans-serif', background: GREY_BG }}>
      <div style={{ background: NAVY_DARK, color: '#fff', padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: `1px solid ${NAVY_LIGHT}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ fontSize: 16, fontWeight: 900, letterSpacing: '-0.3px', fontFamily: FONT_HEAD }}>C2O</div>
          <div style={{ width: 1, height: 16, background: 'rgba(255,255,255,0.2)' }} />
          <div style={{ fontSize: 13, opacity: 0.85 }}>Customer Engine</div>
          <div style={{ fontSize: 10, fontWeight: 700, background: GOLD, color: NAVY_DARK, padding: '2px 8px', borderRadius: 4, letterSpacing: '0.5px' }}>MVP DEMO</div>
        </div>
        <button onClick={reset} style={{ background: 'rgba(255,255,255,0.1)', color: '#fff', border: 'none', padding: '6px 12px', borderRadius: 6, fontSize: 12, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, fontFamily: 'inherit' }}><Icon name="RefreshCw" size={12} /> Reset demo</button>
      </div>
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: GREY_BG, minWidth: 0 }}>
          <div style={{ padding: '12px 24px', borderBottom: `1px solid ${BORDER}`, background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              {view !== 'home' && (
                <button onClick={() => {
                  if (view === 'quote' && step > 0 && step < quoteSteps.length) goBackToStep(step - 1);
                  else if (view === 'quote' && step >= quoteSteps.length) goBackToStep(quoteSteps.length - 1);
                  else setView('home');
                }} style={{ background: 'transparent', border: `1px solid ${BORDER}`, color: MUTED, width: 28, height: 28, borderRadius: 6, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'inherit', flexShrink: 0 }} title="Back"><Icon name="ArrowLeft" size={14} /></button>
              )}
              <MorganAvatar size={32} />
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: INK, lineHeight: 1.2, fontFamily: FONT_HEAD }}>Morgan</div>
                <div style={{ fontSize: 11, color: MUTED, display: 'flex', alignItems: 'center', gap: 4 }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#22c55e' }} />
                  {view === 'home' && 'Always on · 24/7'}
                  {view === 'quote' && `Express Quote · Step ${Math.min(step + 1, quoteSteps.length)} of ${quoteSteps.length}`}
                  {view === 'faq' && 'Answering questions'}
                  {view === 'order' && 'Order placed'}
                  {view === 'advice' && 'Product advice'}
                  {view === 'chat' && 'Live chat — Sarah'}
                </div>
              </div>
            </div>
            {view !== 'home' && <button onClick={() => setView('home')} style={{ background: 'transparent', border: 'none', color: MUTED, cursor: 'pointer', fontSize: 12, fontFamily: 'inherit', display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="X" size={14} /> Home</button>}
          </div>
          {view === 'quote' && step < quoteSteps.length && <div style={{ height: 3, background: BORDER }}><div style={{ height: '100%', width: `${((step + 1) / quoteSteps.length) * 100}%`, background: NAVY, transition: 'width 0.3s' }} /></div>}
          <div ref={scrollRef} style={{ flex: 1, overflow: 'auto', padding: '20px 24px' }}>
            {view === 'home' ? renderHome() : (
              <div style={{ maxWidth: 720, margin: '0 auto' }}>
                {renderMessages()}
                {view === 'quote' && step < quoteSteps.length && renderQuoteInline()}
                {view === 'faq' && renderFAQChips()}
                {view === 'advice' && renderAdviceChips()}
                {view === 'quote' && step >= quoteSteps.length && renderQuoteResults()}
                {view === 'order' && renderOrderIntent()}
              </div>
            )}
          </div>
          {showFooter && <div style={{ padding: '14px 24px 0', background: '#fff' }}><div style={{ maxWidth: 720, margin: '0 auto' }}>{renderFooterInput()}</div></div>}
          <div style={{ padding: '12px 24px 14px', background: '#fff', borderTop: showFooter ? 'none' : `1px solid ${BORDER}` }}>
            <div style={{ maxWidth: 720, margin: '0 auto', display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
              {[
                { v: 'quote', icon: 'FileText', label: 'Quote' },
                { v: 'faq', icon: 'MessageSquare', label: 'FAQ' },
                { v: 'advice', icon: 'Sparkles', label: 'Advice' },
                { v: 'chat', icon: 'Headphones', label: 'Human' },
              ].map(c => {
                const isActive = view === c.v;
                return (
                  <button key={c.v} onClick={() => startCapability(c.v)} style={{ padding: '9px 16px', borderRadius: 22, border: `2px solid ${NAVY}`, background: isActive ? NAVY : '#fff', color: isActive ? '#fff' : NAVY, fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', display: 'flex', alignItems: 'center', gap: 6, boxShadow: isActive ? '0 2px 6px rgba(74, 144, 226, 0.25)' : 'none' }}>
                    <Icon name={c.icon} size={14} /> {c.label}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CustomerEngine />);
</script>
</body>
</html>
